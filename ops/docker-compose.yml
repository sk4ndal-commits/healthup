services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app_template
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_template"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=app_template;Username=app;Password=app"
      JwtSettings__Secret: "${JWT_SECRET:-A_Very_Long_And_Secure_Secret_Key_For_Development_12345}"
      JwtSettings__Issuer: "AppTemplate"
      JwtSettings__Audience: "AppTemplateUsers"
      JwtSettings__ExpirationMinutes: "60"
      JwtSettings__RefreshExpirationDays: "7"
      Cors__AllowedOrigins__0: "http://localhost:8081"
      Cors__AllowedOrigins__1: "http://localhost:80"
      Cors__AllowedOrigins__2: "http://frontend"
      SmtpSettings__UseMock: "true"
      Logging__LogLevel__Default: "Information"
      FeatureManagement__TenantSelfServiceRegistration: "true"
      AppSettings__FrontendUrl: "http://localhost:8081"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  dbdata:
