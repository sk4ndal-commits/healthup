name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Build once, upload artifacts for parallel test runners ────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Template.sln

      - name: Build
        run: dotnet build Template.sln -c Release --no-restore

      - name: Format check
        run: dotnet format Template.sln --verify-no-changes
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/tests/Application.Tests/bin/Release/
            backend/tests/Infrastructure.Tests/bin/Release/
            backend/tests/Api.Tests/bin/Release/
            backend/src/Domain/bin/Release/
            backend/src/Application/bin/Release/
            backend/src/Infrastructure/bin/Release/
            backend/src/Host/bin/Release/
            backend/src/Host/wwwroot/
          retention-days: 1

  # ── 2. Run each test project on its own runner in parallel ──────────────────
  backend-test:
    name: Backend — Test (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: backend-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Application.Tests
            path: tests/Application.Tests/Application.Tests.csproj
          - project: Infrastructure.Tests
            path: tests/Infrastructure.Tests/Infrastructure.Tests.csproj
          - project: Api.Tests
            path: tests/Api.Tests/Api.Tests.csproj

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Template.sln

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend

      - name: Test with coverage
        run: |
          dotnet test ${{ matrix.path }} -c Release --no-build --verbosity normal \
            --collect "XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project }}
          path: backend/coverage/**/coverage.cobertura.xml
          retention-days: 1

  # ── 3. Merge coverage reports and enforce gate ───────────────────────────────
  backend-coverage:
    name: Backend — Coverage Gate
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: backend/coverage
          merge-multiple: true

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Coverage gate (≥20% line coverage)
        run: |
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:TextSummary
          cat ./coverage/report/Summary.txt
          LINE_COVERAGE=$(grep "Line coverage" ./coverage/report/Summary.txt | grep -oP '\d+(\.\d+)?(?=%)' | head -1)
          echo "Line coverage: ${LINE_COVERAGE}%"
          awk -v cov="$LINE_COVERAGE" 'BEGIN { if (cov+0 < 20) { print "Coverage " cov "% is below 20% threshold"; exit 1 } }'
        continue-on-error: true

  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend, mobile]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --max-warnings 0
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  mobile:
    name: Mobile — Lint, Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Lint
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug
